<!DOCTYPE html>
<html>
<head>
    <title>Aigaane V3 PRO</title>
    <style>
        body{font-family:Arial;background:linear-gradient(135deg,#1a1a2e,#16213e);color:white;padding:20px}
        .container{max-width:800px;margin:0 auto}
        h1{color:#4ecdc4}
        button{background:#4ecdc4;color:#1a1a2e;padding:10px 20px;border:none;border-radius:5px;cursor:pointer}
        pre{background:#000;padding:10px;border-radius:5px;overflow:auto}
    </style>
</head>
<body>
<div class="container">
    <h1>🎵 Aigaane V3 PRO</h1>
    <p>Vedic Aesthetic Engine is running!</p>
    <button onclick="testAPI()">Test API</button>
    <pre id="result"></pre>
</div>
<script>
async function testAPI() {
    const res = await fetch('/api/health');
    const data = await res.json();
    document.getElementById('result').innerHTML = JSON.stringify(data, null, 2);
}
testAPI();
</script>
</body>
</html>
